name: build-debug-apk

on:
  workflow_dispatch: 
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: 'true'

      - name: set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Generate keystore (CI signing)
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          keytool -genkey -v -keystore wireguard-ci.keystore             -alias "$KEY_ALIAS" -keyalg RSA -keysize 2048             -validity 10000 -storepass "$KEYSTORE_PASSWORD"             -keypass "$KEYSTORE_PASSWORD"             -dname "CN=WireGuard CI, OU=Development, O=github-xihe, L=Unknown, ST=Unknown, C=CN"

      - name: Build signed APK with Gradle
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/wireguard-ci.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v7
        with:
          name: WireGuard-Release-Build
          path: ui/build/outputs/apk/release/*.apk

      - name: Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ui/build/outputs/apk/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
